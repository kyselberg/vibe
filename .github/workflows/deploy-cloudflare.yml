name: Deploy Cloudflare Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Run database migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build for Cloudflare
        run: pnpm build:cloudflare
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build worker secret list
        id: worker-secrets
        run: |
          secrets=(
            DATABASE_URL
            NUXT_APP_PASSCODE
            NUXT_SESSION_SECRET
            CLOUDFLARE_ACCOUNT_ID
            R2_ACCESS_KEY_ID
            R2_SECRET_ACCESS_KEY
            R2_BUCKET
          )

          if [ -n "${R2_ENDPOINT}" ]; then
            secrets+=(R2_ENDPOINT)
          fi

          if [ -n "${R2_REGION}" ]; then
            secrets+=(R2_REGION)
          fi

          {
            echo 'value<<EOF'
            printf '%s\n' "${secrets[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NUXT_APP_PASSCODE: ${{ secrets.NUXT_APP_PASSCODE }}
          NUXT_SESSION_SECRET: ${{ secrets.NUXT_SESSION_SECRET }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_REGION: ${{ secrets.R2_REGION }}

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          secrets: ${{ steps.worker-secrets.outputs.value }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NUXT_APP_PASSCODE: ${{ secrets.NUXT_APP_PASSCODE }}
          NUXT_SESSION_SECRET: ${{ secrets.NUXT_SESSION_SECRET }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_REGION: ${{ secrets.R2_REGION }}
